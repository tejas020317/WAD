<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>User Management Dashboard</h1>
            <p>Manage your application users efficiently</p>
        </header>

        <main class="dashboard-content">
            <section class="card form-card">
                <div class="card-header">
                    <h2 id="form-title"><i class="fas fa-user-plus"></i> Register User</h2>
                </div>
                <div class="card-body">
                    <form id="user-form">
                        <input type="hidden" id="user-id">
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">First Name</label>
                                <div class="input-icon-wrapper">
                                    <i class="fas fa-user"></i>
                                    <input type="text" id="firstName" placeholder="Tejas" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name</label>
                                <div class="input-icon-wrapper">
                                    <i class="fas fa-user-tag"></i>
                                    <input type="text" id="lastName" placeholder="Tambe" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <div class="input-icon-wrapper">
                                    <i class="fas fa-envelope"></i>
                                    <input type="email" id="email" placeholder="tejascollegeid@gmail.com" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <div class="input-icon-wrapper">
                                    <i class="fas fa-phone"></i>
                                    <input type="text" id="phone" placeholder="+91 9730312826" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" id="submit-btn" class="btn btn-primary btn-gradient">
                                <i class="fas fa-plus-circle"></i> Create User
                            </button>
                            <button type="button" id="cancel-btn" class="btn btn-secondary" style="display:none;">
                                <i class="fas fa-times"></i> Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <section class="card table-card">
                <div class="card-header">
                    <h2><i class="fas fa-users"></i> Users Directory</h2>
                </div>
                <div class="table-responsive">
                    <table id="user-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Email</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Phone</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="user-list">
                            <!-- Users get populated here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
