<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Static Web Server</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="bg-gradient"></div>
  <main class="glass">
    <header>
      <div class="title">📂 Static Web Server</div>
      <p class="subtitle">Browse the directory like a modern cloud file browser.</p>
    </header>
    <p class="subtitle">Continue to the file list to view and open files.</p>
    <p style="margin-top:16px;"><a class="file-link" style="display:inline-flex;align-items:center;gap:8px;" href="/">
      <span class="file-icon" data-ext="go">▶</span>
      <span class="file-name">Open file list</span>
      <span class="open-indicator" style="opacity:1;">↗</span>
    </a></p>
  </main>
</body>
</html>
