<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Bharti Vidyapeeth Hospital</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="styles.css" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 120px auto 60px;
        }

        .icon-box-sm {
            width: 45px;
            height: 45px;
            background: rgba(15, 52, 96, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .card:hover .icon-box-sm {
            background: var(--primary-color);
            color: white;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-heart-pulse text-danger me-2"></i>BV Hospital
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="departments.html">Departments</a></li>
                    <li class="nav-item"><a class="nav-link" href="doctors.html">Doctors</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="staff.html">Staff</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>

                    <!-- Dynamic Auth Links -->
                    <li class="nav-item ms-lg-3 auth-logged-out" style="display: none;">
                        <a href="login.html" class="btn btn-outline-primary btn-sm rounded-pill px-4">Login</a>
                    </li>
                    <li class="nav-item ms-lg-2 auth-logged-out mt-2 mt-lg-0" style="display: none;">
                        <a href="register.html" class="btn btn-custom-primary btn-sm rounded-pill px-4">Register</a>
                    </li>

                    <li class="nav-item ms-lg-3 auth-logged-in">
                        <a href="profile.html"
                            class="btn btn-outline-primary btn-sm rounded-pill px-4 active">Profile</a>
                    </li>
                    <li class="nav-item ms-lg-2 auth-logged-in mt-2 mt-lg-0">
                        <button onclick="userService.logout()"
                            class="btn btn-custom-primary btn-sm rounded-pill px-4">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container profile-container">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden" id="profileCard" style="display: none;">
            <!-- Profile Header -->
            <div class="card-header bg-white border-bottom-0 pb-0 pt-5 text-center position-relative">
                <div class="position-absolute top-0 start-0 w-100"
                    style="height: 120px; background: var(--gradient-main); border-radius: 15px 15px 0 0;"></div>

                <div class="position-relative d-inline-block mt-3 mb-3">
                    <div class="rounded-circle bg-white p-2 shadow-sm d-inline-block">
                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                            style="width: 120px; height: 120px; background: #e9ecef; border: 4px solid var(--primary-color);">
                            <i class="fas fa-user-md fa-4x" style="color: #cbd3da;"></i>
                        </div>
                    </div>
                </div>

                <h2 class="fw-bold mb-1 text-primary" id="profileUsername">Username</h2>
                <p class="text-muted mb-4"><i class="fas fa-check-circle text-success me-1"></i> Verified User</p>
            </div>

            <!-- Profile Info -->
            <div class="card-body px-5 pb-5 pt-3">
                <h5 class="fw-bold mb-4 pb-2 text-uppercase text-danger"
                    style="border-bottom: 2px solid rgba(233, 69, 96, 0.2); font-size: 0.9rem; letter-spacing: 1px;">
                    <i class="fas fa-address-card me-2"></i>Personal Information
                </h5>

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <div class="d-flex align-items-center p-3 rounded-3"
                            style="background: rgba(15, 52, 96, 0.03);">
                            <div class="flex-shrink-0 me-3">
                                <div class="icon-box-sm"><i class="fas fa-envelope"></i></div>
                            </div>
                            <div>
                                <small class="text-muted d-block mb-1">Email Address</small>
                                <span class="fw-medium text-dark" id="profileEmail">Not provided</span>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="d-flex align-items-center p-3 rounded-3"
                            style="background: rgba(15, 52, 96, 0.03);">
                            <div class="flex-shrink-0 me-3">
                                <div class="icon-box-sm"><i class="fas fa-calendar-alt"></i></div>
                            </div>
                            <div>
                                <small class="text-muted d-block mb-1">Age</small>
                                <span class="fw-medium text-dark" id="profileAge">Not provided</span>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="d-flex align-items-center p-3 rounded-3"
                            style="background: rgba(15, 52, 96, 0.03);">
                            <div class="flex-shrink-0 me-3">
                                <div class="icon-box-sm"><i class="fas fa-map-marker-alt"></i></div>
                            </div>
                            <div>
                                <small class="text-muted d-block mb-1">City</small>
                                <span class="fw-medium text-dark" id="profileCity">Not provided</span>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="d-flex align-items-center p-3 rounded-3"
                            style="background: rgba(15, 52, 96, 0.03);">
                            <div class="flex-shrink-0 me-3">
                                <div class="icon-box-sm"><i class="fas fa-clock"></i></div>
                            </div>
                            <div>
                                <small class="text-muted d-block mb-1">Account Status</small>
                                <span class="badge bg-success rounded-pill px-3">Active</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <a href="contact.html#appointment" class="btn btn-custom-primary rounded-pill px-4">Book New
                        Appointment</a>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="user-service.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check auth state immediately
            if (!userService.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            // User is authenticated, show profile data
            const user = userService.getCurrentUser();

            document.getElementById('profileUsername').textContent = user.username;
            document.getElementById('profileEmail').textContent = user.email || 'Not provided';
            document.getElementById('profileAge').textContent = user.age || 'Not provided';
            document.getElementById('profileCity').textContent = user.city || 'Not provided';

            // Unhide card after rendering
            document.getElementById('profileCard').style.display = 'block';
        });
    </script>
</body>

</html>
