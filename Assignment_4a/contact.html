<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Veg Lifestyle - Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">VegLife</a>
        <button class="mobile-menu-btn" id="mobileBtn">☰</button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="benefits.html">Benefits</a></li>
            <li><a href="diet-plan.html">Diet Plan</a></li>
            <li><a href="tips.html">Tips</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section id="contact">
            <h2 class="section-title">We'd Love Your Feedback</h2>
            <form class="contact-form" id="feedbackForm">
                <div class="form-group">
                    <label for="name">Name <span style="color:red">*</span></label>
                    <input type="text" id="name" placeholder="Your Name">
                    <div class="error-message" id="nameError">Please enter your name.</div>
                </div>
                <div class="form-group">
                    <label for="email">Email <span style="color:red">*</span></label>
                    <input type="email" id="email" placeholder="Your Email">
                    <div class="error-message" id="emailError">Please enter a valid email address.</div>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="4" placeholder="Share your thoughts or questions..."></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 VegLife. Designed with a healthy mindset.</p>
    </footer>
</body>
</html>
