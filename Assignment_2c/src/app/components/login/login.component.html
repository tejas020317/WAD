<div class="auth-page-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="icon-circle">
        <i class="bi bi-person-fill"></i>
      </div>
      <h2>Welcome back</h2>
      <p>Please enter your details to sign in</p>
    </div>

    <form (ngSubmit)="login()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-container">
          <i class="bi bi-envelope icon-left"></i>
          <input type="email" class="form-control" placeholder="name@example.com" name="email" [(ngModel)]="email" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-container">
          <i class="bi bi-lock icon-left"></i>
          <input type="password" class="form-control" placeholder="••••••••" name="password" [(ngModel)]="password" required>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="!loginForm.valid">
        Sign in
      </button>
    </form>

    <div *ngIf="errorMsg" class="error-alert">
      <i class="bi bi-exclamation-circle"></i>
      {{ errorMsg }}
    </div>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Sign up</a></p>
    </div>
  </div>
</div>
