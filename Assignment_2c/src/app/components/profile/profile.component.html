<div class="row mt-5" *ngIf="user">
  <div class="col-md-6 offset-md-3">
    <div class="card">
      <div class="card-header">
        <h3>User Profile</h3>
      </div>
      <div class="card-body">
        <p><strong>Name:</strong> {{ user.name }}</p>
        <p><strong>Email:</strong> {{ user.email }}</p>
      </div>
    </div>
  </div>
</div>
